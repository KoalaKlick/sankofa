# Supabase Configuration for AfroTix
# This file defines the Supabase project configuration

[project]
id = "your-project-ref"
name = "AfroTix"

[db]
# Database settings
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[auth]
enabled = true
site_url = "http://localhost:3000"
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.external]
# Add OAuth providers as needed

[storage]
enabled = true
file_size_limit = "50MiB"

[realtime]
enabled = true

# Email templates are configured in the Supabase dashboard
